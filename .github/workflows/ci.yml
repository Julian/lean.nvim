name: Tests

on:
  push:
    branches-ignore:
      - "benchmark*"
      - "wip*"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        nvim-version:
          - "0.11.5" # MIN_SUPPORTED_NVIM
          - stable
          - nightly

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - uses: Julian/setup-lean@c93774d9180849a5b6c4034c3c63d4544bdd943c
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b
      - name: Run tests
        run: just test

  release:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')

    needs: ci
    runs-on: ubuntu-latest
    environment: release

    permissions:
      attestations: write
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Upload to LuaRocks
        uses: nvim-neorocks/luarocks-tag-release@adbca66e871a519055f4917c6af5fbf19f656f5d
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
      - name: Create a GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
